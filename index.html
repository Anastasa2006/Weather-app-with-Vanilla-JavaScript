<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Прогноз погоды</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="weather-app">
      <div class="header">
        <div class="city-section" id="citySection">
          <i class="fas fa-map-pin city-icon"></i>
          <span class="city-name" id="cityName">Москва</span>
          <span class="country-code" id="countryCode">RU</span>
        </div>
        <form id="searchForm" class="search-form">
          <input
            type="text"
            id="searchInput"
            placeholder="Введите город..."
            class="search-input"
            autocomplete="off"
          />
          <button type="submit" class="search-btn" aria-label="Поиск города">
            <i class="fas fa-search"></i>
          </button>
        </form>
      </div>

      <div class="main-weather" id="mainWeather">
        <div class="weather-icon-big" id="weatherIcon">
          <i class="fas fa-cloud-sun"></i>
        </div>
        <div class="temperature" id="temperature">18<sup>°C</sup></div>
        <div class="weather-description" id="weatherDescription">
          Переменная облачность
        </div>

        <div class="extra-details">
          <div class="detail-item">
            <i class="fas fa-droplet"></i>
            <span class="detail-label">Влажность</span>
            <span class="detail-value" id="humidity">62%</span>
          </div>
          <div class="detail-item">
            <i class="fas fa-wind"></i>
            <span class="detail-label">Ветер</span>
            <span class="detail-value" id="windSpeed">4 м/с</span>
          </div>
          <div class="detail-item">
            <i class="fas fa-eye"></i>
            <span class="detail-label">Видимость</span>
            <span class="detail-value" id="visibility">10 км</span>
          </div>
        </div>
      </div>

      <div class="forecast-section">
        <div class="forecast-title">
          <i class="fas fa-calendar-alt"></i> Прогноз на 7 дней
        </div>
        <div class="forecast-list" id="forecastList">
          <div class="loading-forecast">Загрузка прогноза...</div>
        </div>
      </div>

      <div class="footer-note">
        <span
          ><i class="fas fa-sync-alt"></i> Обновлено:
          <span id="updateTime">сегодня 14:30</span></span
        >
        <span
          ><i class="fas fa-map-marker-alt"></i>
          <span id="location">Москва, RU</span></span
        >
      </div>
    </div>

    <div class="modal" id="cityModal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Выберите город</h3>
          <button class="modal-close" id="modalClose">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
