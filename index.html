<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Прогноз погоды</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="weather-app">
      <div class="header">
        <div class="city-section">
          <i class="fas fa-map-pin city-icon"></i>
          <span class="city-name" id="cityName">Москва</span>
        </div>
        <form id="searchForm" class="search-form">
          <input
            type="text"
            id="searchInput"
            placeholder="Введите город..."
            class="search-input"
            autocomplete="off"
          />
          <button type="submit" class="search-btn" aria-label="Поиск города">
            <i class="fas fa-search"></i>
          </button>
        </form>
      </div>

      <div class="main-weather" id="mainWeather">
        <div class="weather-icon-big" id="weatherIcon">
          <i class="fas fa-cloud-sun"></i>
        </div>
        <div class="temperature" id="temperature">18<sup>°C</sup></div>
        <div class="weather-description" id="weatherDescription">
          Переменная облачность
        </div>

        <div class="extra-details">
          <div class="detail-item">
            <i class="fas fa-droplet"></i>
            <span class="detail-label">Влажность</span>
            <span class="detail-value" id="humidity">62%</span>
          </div>
          <div class="detail-item">
            <i class="fas fa-wind"></i>
            <span class="detail-label">Ветер</span>
            <span class="detail-value" id="windSpeed">4 м/с</span>
          </div>
          <div class="detail-item">
            <i class="fas fa-eye"></i>
            <span class="detail-label">Видимость</span>
            <span class="detail-value" id="visibility">10 км</span>
          </div>
        </div>
      </div>

      <div class="forecast-section">
        <div class="forecast-title">
          <i class="fas fa-calendar-alt"></i> Прогноз на 7 дней
        </div>
        <div class="forecast-list" id="forecastList">
          <div class="forecast-day">
            <span class="forecast-day-name">Пн</span>
            <span class="forecast-day-icon"
              ><i class="fas fa-cloud-sun"></i
            ></span>
            <span class="forecast-day-temps">
              <span class="max-temp">19°</span>
              <span class="min-temp">12°</span>
            </span>
          </div>
          <div class="forecast-day">
            <span class="forecast-day-name">Вт</span>
            <span class="forecast-day-icon"
              ><i class="fas fa-cloud-rain"></i
            ></span>
            <span class="forecast-day-temps">
              <span class="max-temp">16°</span>
              <span class="min-temp">10°</span>
            </span>
          </div>
          <div class="forecast-day">
            <span class="forecast-day-name">Ср</span>
            <span class="forecast-day-icon"><i class="fas fa-sun"></i></span>
            <span class="forecast-day-temps">
              <span class="max-temp">22°</span>
              <span class="min-temp">14°</span>
            </span>
          </div>
          <div class="forecast-day">
            <span class="forecast-day-name">Чт</span>
            <span class="forecast-day-icon"><i class="fas fa-cloud"></i></span>
            <span class="forecast-day-temps">
              <span class="max-temp">20°</span>
              <span class="min-temp">13°</span>
            </span>
          </div>
          <div class="forecast-day">
            <span class="forecast-day-name">Пт</span>
            <span class="forecast-day-icon"
              ><i class="fas fa-cloud-sun-rain"></i
            ></span>
            <span class="forecast-day-temps">
              <span class="max-temp">17°</span>
              <span class="min-temp">11°</span>
            </span>
          </div>
          <div class="forecast-day">
            <span class="forecast-day-name">Сб</span>
            <span class="forecast-day-icon"><i class="fas fa-sun"></i></span>
            <span class="forecast-day-temps">
              <span class="max-temp">23°</span>
              <span class="min-temp">15°</span>
            </span>
          </div>
          <div class="forecast-day">
            <span class="forecast-day-name">Вс</span>
            <span class="forecast-day-icon"
              ><i class="fas fa-cloud-sun"></i
            ></span>
            <span class="forecast-day-temps">
              <span class="max-temp">21°</span>
              <span class="min-temp">14°</span>
            </span>
          </div>
        </div>
      </div>

      <div class="footer-note">
        <span
          ><i class="fas fa-sync-alt"></i> Обновлено:
          <span id="updateTime">сегодня 14:30</span></span
        >
        <span
          ><i class="fas fa-map-marker-alt"></i>
          <span id="location">Москва, RU</span></span
        >
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
